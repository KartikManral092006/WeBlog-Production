services:
  db:
    profiles: ["localdb"]
    image: postgres:16-alpine
    container_name: weblog-db
    environment:
      POSTGRES_DB: weblog
      POSTGRES_USER: weblog
      POSTGRES_PASSWORD: weblog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weblog -d weblog"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    container_name: weblog-backend
    environment:
      PORT: "${PORT:-8080}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8080
    container_name: weblog-frontend
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
